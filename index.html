<title>ScoresInstant — Live scores & results</title>
<style>
  :root{
    --bg:#0b0e14;
    --panel:#11151d;
    --panel-2:#161b25;
    --panel-3:#1a2030;
    --border:#222836;
    --border-strong:#2d3548;
    --text:#e8ebf0;
    --muted:#7a8294;
    --live:#1fd65f;
    --live-bg:rgba(31,214,95,0.12);
    --accent:#ffb020;
    --finished:#5a6275;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
    overflow-x:hidden;
  }
  button{
    font-family:inherit;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
  }
  /* Smooth scroll on touch */
  .sport-tabs, .date-bar, .news-cat-tabs, .league-list, .news-ticker-track{
    -webkit-overflow-scrolling:touch;
  }

  /* ---------- HEADER / TOP NAV ---------- */
  header{
    background:var(--panel);
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    z-index:20;
  }
  .header-inner{
    max-width:1280px;
    margin:0 auto;
    padding:12px 20px;
    display:flex;
    align-items:center;
    gap:24px;
  }
  .logo{
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:800;
    font-size:20px;
    letter-spacing:-0.5px;
    flex-shrink:0;
  }
  .logo .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--live);
    animation:pulse 1.6s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(31,214,95,.6);}
    70%{box-shadow:0 0 0 8px rgba(31,214,95,0);}
    100%{box-shadow:0 0 0 0 rgba(31,214,95,0);}
  }
  .nav{
    display:flex;
    gap:4px;
    flex:1;
    overflow-x:auto;
    scrollbar-width:none;
  }
  .nav::-webkit-scrollbar{ display:none;}
  .nav-btn{
    padding:8px 14px;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    color:#c4c9d4;
    background:transparent;
    border:none;
    cursor:pointer;
    white-space:nowrap;
    transition:.15s;
    display:flex;
    align-items:center;
    gap:6px;
    position:relative;
  }
  .nav-btn:hover{ color:#fff; background:var(--panel-2);}
  .nav-btn.active{
    color:#fff;
    background:var(--panel-3);
  }
  .nav-btn.active::after{
    content:"";
    position:absolute;
    bottom:-13px;
    left:14px;
    right:14px;
    height:2px;
    background:var(--accent);
    border-radius:2px;
  }
  .nav-btn.live{ color:var(--live);}
  .nav-btn.live.active{ background:rgba(31,214,95,.15); color:var(--live);}
  .nav-btn.live .dot{
    width:7px;height:7px;border-radius:50%;
    background:currentColor;
    animation:pulse 1.6s infinite;
  }
  .last-updated{
    font-size:12px;
    color:var(--muted);
    flex-shrink:0;
  }

  /* Language switcher */
  .lang-switch{
    display:flex;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:2px;
    flex-shrink:0;
  }
  .lang-btn{
    padding:4px 10px;
    border-radius:6px;
    font-size:12px;
    font-weight:700;
    background:transparent;
    border:none;
    color:var(--muted);
    cursor:pointer;
    letter-spacing:.5px;
  }
  .lang-btn.active{
    background:var(--accent);
    color:#1a1300;
  }
  .lang-btn:hover:not(.active){ color:var(--text);}

  /* dropdown for "Other sports" */
  .dropdown{ position:relative;}
  .dropdown-menu{
    position:fixed;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:6px;
    min-width:220px;
    box-shadow:0 12px 32px rgba(0,0,0,.5);
    display:none;
    z-index:9999;
  }
  .dropdown.open .dropdown-menu{ display:block;}
  .dropdown-item{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    border-radius:6px;
    font-size:14px;
    font-weight:500;
    color:var(--text);
    background:transparent;
    border:none;
    width:100%;
    text-align:left;
    cursor:pointer;
  }
  .dropdown-item:hover{ background:var(--panel-2);}
  .dropdown-item.active{ background:var(--panel-3); color:var(--accent);}

  /* ---------- NEWS TICKER ---------- */
  .news-ticker{
    background:var(--panel-2);
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    height:34px;
    overflow:hidden;
    position:relative;
  }
  .news-ticker-label{
    background:var(--accent);
    color:#1a1300;
    font-size:11px;
    font-weight:800;
    padding:0 12px;
    height:100%;
    display:flex;
    align-items:center;
    letter-spacing:.5px;
    flex-shrink:0;
    cursor:pointer;
    text-transform:uppercase;
  }
  .news-ticker-track{
    flex:1;
    overflow:hidden;
    white-space:nowrap;
    position:relative;
    mask-image:linear-gradient(to right, transparent 0, black 30px, black calc(100% - 30px), transparent 100%);
  }
  .news-ticker-content{
    display:inline-flex;
    align-items:center;
    animation:ticker-scroll 80s linear infinite;
    padding-left:20px;
  }
  .news-ticker:hover .news-ticker-content{ animation-play-state:paused;}
  .news-ticker-item{
    color:var(--text);
    font-size:13px;
    cursor:pointer;
    padding:0 4px;
    transition:.15s;
  }
  .news-ticker-item:hover{ color:var(--accent);}
  .news-ticker-tag{
    color:var(--accent);
    font-size:10px;
    font-weight:700;
    text-transform:uppercase;
    margin-right:6px;
    letter-spacing:.5px;
  }
  .news-ticker-sep{
    color:var(--muted);
    margin:0 16px;
    font-size:14px;
  }
  @keyframes ticker-scroll{
    0%{ transform:translateX(0);}
    100%{ transform:translateX(-50%);}
  }

  /* ---------- DATE BAR ---------- */
  .date-bar{
    background:var(--panel);
    border-bottom:1px solid var(--border);
    padding:8px 20px;
    display:flex;
    justify-content:center;
    gap:4px;
    overflow-x:auto;
    scrollbar-width:none;
  }
  .date-bar::-webkit-scrollbar{ display:none;}
  .date-btn{
    padding:6px 12px;
    border-radius:8px;
    background:transparent;
    border:1px solid transparent;
    color:var(--muted);
    cursor:pointer;
    font-size:13px;
    font-weight:600;
    white-space:nowrap;
    transition:.15s;
    min-width:60px;
    text-align:center;
  }
  .date-btn:hover{ color:var(--text);}
  .date-btn.active{
    background:var(--panel-2);
    color:var(--text);
    border-color:var(--border-strong);
  }
  .date-btn .day{ font-size:10px; display:block; color:var(--muted); font-weight:500; text-transform:uppercase; letter-spacing:.5px;}
  .date-btn.active .day{ color:var(--accent);}
  .date-arrow{
    background:transparent;
    border:1px solid var(--border);
    color:var(--muted);
    border-radius:8px;
    width:32px;
    cursor:pointer;
    font-size:16px;
  }
  .date-arrow:hover{ color:var(--text); border-color:var(--border-strong);}

  /* ---------- LAYOUT ---------- */
  .layout{
    max-width:1280px;
    margin:0 auto;
    display:grid;
    grid-template-columns:240px 1fr;
    gap:20px;
    padding:20px;
  }
  .layout.no-sidebar{ grid-template-columns:1fr;}

  /* ---------- SIDEBAR (LEAGUES) ---------- */
  aside{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px;
    height:fit-content;
    position:sticky;
    top:120px;
    max-height:calc(100vh - 140px);
    overflow-y:auto;
  }
  .sidebar-title{
    font-size:12px;
    font-weight:700;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.5px;
    margin-bottom:10px;
    padding:0 4px;
  }
  .league-list{ display:flex; flex-direction:column; gap:2px;}
  .league-btn{
    padding:8px 10px;
    border-radius:6px;
    background:transparent;
    border:none;
    color:var(--text);
    font-size:13px;
    cursor:pointer;
    text-align:left;
    transition:.1s;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .league-btn:hover{ background:var(--panel-2);}
  .league-btn.active{ background:var(--panel-3); color:var(--accent); font-weight:600;}
  .league-btn .country-flag{ font-size:14px; margin-right:8px; line-height:1;}

  /* ---------- MAIN CONTENT ---------- */
  main{ min-width:0;}
  .section-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
    padding:0 4px;
  }
  .section-head h2{ font-size:16px; font-weight:700; color:var(--text); margin:0;}
  .count-badge{
    font-size:11px;
    color:var(--muted);
    background:var(--panel);
    padding:3px 8px;
    border-radius:10px;
    border:1px solid var(--border);
  }

  .league-group{
    margin-bottom:14px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
  }
  .league-header{
    padding:10px 14px;
    background:var(--panel-2);
    font-size:12px;
    font-weight:700;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.5px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .league-flag{
    font-size:16px;
    line-height:1;
    flex-shrink:0;
  }
  .league-name{
    flex:1;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .league-sport-tag{
    font-size:10px;
    background:var(--bg);
    padding:2px 6px;
    border-radius:4px;
    color:var(--muted);
    border:1px solid var(--border);
  }
  .match-row{
    display:grid;
    grid-template-columns:60px 1fr 36px;
    align-items:center;
    padding:10px 14px;
    border-bottom:1px solid var(--border);
    font-size:14px;
    gap:10px;
  }
  .match-row:last-child{ border-bottom:none;}
  .match-row:hover{ background:#161c28;}
  .status{
    font-size:12px;
    font-weight:700;
    text-align:center;
    line-height:1.2;
  }
  .status.live{
    color:var(--live);
    background:var(--live-bg);
    padding:4px 6px;
    border-radius:6px;
  }
  .status.finished{ color:var(--finished);}
  .status.scheduled{ color:var(--muted); font-weight:500;}
  .teams{ display:flex; flex-direction:column; gap:4px; min-width:0;}
  .team-line{ display:flex; justify-content:space-between; align-items:center; gap:8px;}
  .team-name{ font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .team-line.winner .team-name{ font-weight:700;}
  .score{ font-weight:800; font-size:15px; min-width:22px; text-align:right; flex-shrink:0;}
  .score.live-score{ color:var(--live);}

  .empty, .loading, .error{
    text-align:center;
    color:var(--muted);
    padding:50px 20px;
    font-size:14px;
  }
  .error{ color:#ff6b6b;}
  .loading::after{
    content:""; display:inline-block; width:14px; height:14px;
    border:2px solid var(--border-strong); border-top-color:var(--accent);
    border-radius:50%; margin-left:10px; vertical-align:middle;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg);}}

  /* ---------- NEWS ---------- */
  .news-cat-tabs{
    display:flex;
    gap:6px;
    margin-bottom:16px;
    overflow-x:auto;
    scrollbar-width:none;
    padding-bottom:2px;
  }
  .news-cat-tabs::-webkit-scrollbar{ display:none;}
  .news-cat-tab{
    padding:7px 14px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
    color:var(--muted);
    background:transparent;
    border:1px solid var(--border);
    cursor:pointer;
    white-space:nowrap;
    transition:.15s;
  }
  .news-cat-tab:hover{ color:var(--text); border-color:var(--border-strong);}
  .news-cat-tab.active{
    background:var(--accent);
    color:#1a1300;
    border-color:var(--accent);
  }
  .news-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:16px;
  }
  .news-card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:.15s;
    display:flex;
    flex-direction:column;
  }
  .news-card:hover{ border-color:var(--border-strong); transform:translateY(-2px);}
  .news-image{
    width:100%;
    height:160px;
    background:linear-gradient(135deg, var(--panel-3), var(--panel-2));
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:48px;
  }
  .news-body{ padding:14px;}
  .news-tag{
    font-size:10px;
    font-weight:700;
    color:var(--accent);
    text-transform:uppercase;
    letter-spacing:.5px;
    margin-bottom:6px;
  }
  .news-title{
    font-size:15px;
    font-weight:700;
    line-height:1.35;
    margin:0 0 8px;
  }
  .news-meta{
    font-size:12px;
    color:var(--muted);
    display:flex;
    gap:8px;
    align-items:center;
  }
  .news-excerpt{
    font-size:13px;
    color:var(--muted);
    line-height:1.5;
    margin:8px 0 0;
  }

  /* ---------- NEWS MODAL ---------- */
  .news-modal{
    position:fixed;
    inset:0;
    z-index:1000;
    display:none;
    align-items:flex-start;
    justify-content:center;
    padding:40px 20px;
    overflow-y:auto;
  }
  .news-modal.open{ display:flex;}
  .news-modal-backdrop{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    backdrop-filter:blur(4px);
    z-index:-1;
  }
  .news-modal-content{
    position:relative;
    width:100%;
    max-width:720px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
    animation:modal-in .2s ease-out;
  }
  @keyframes modal-in{
    from{ opacity:0; transform:translateY(20px);}
    to{ opacity:1; transform:translateY(0);}
  }
  .news-modal-image{
    width:100%;
    height:280px;
    background:var(--panel-3) center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:80px;
  }
  .news-modal-close{
    position:absolute;
    top:14px;
    right:14px;
    width:36px;
    height:36px;
    border-radius:50%;
    background:rgba(0,0,0,.6);
    border:none;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    z-index:2;
    backdrop-filter:blur(4px);
  }
  .news-modal-close:hover{ background:rgba(0,0,0,.8);}
  .news-modal-body{ padding:24px 28px 28px;}
  .news-modal-tag{
    font-size:11px;
    font-weight:700;
    color:var(--accent);
    text-transform:uppercase;
    letter-spacing:.5px;
    margin-bottom:10px;
  }
  .news-modal-title{
    font-size:22px;
    font-weight:700;
    line-height:1.3;
    margin:0 0 10px;
    color:var(--text);
  }
  .news-modal-meta{
    font-size:13px;
    color:var(--muted);
    margin-bottom:16px;
    padding-bottom:16px;
    border-bottom:1px solid var(--border);
  }
  .news-modal-text{
    font-size:15px;
    line-height:1.7;
    color:var(--text);
    margin-bottom:20px;
  }
  .news-modal-text p{ margin:0 0 12px;}
  .news-modal-source{
    font-size:12px;
    color:var(--muted);
    padding-top:14px;
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .news-modal-source a{
    color:var(--accent);
    text-decoration:none;
    font-size:12px;
  }
  .news-modal-source a:hover{ text-decoration:underline;}

  /* ---------- FOOTER ---------- */
  footer{
    text-align:center;
    color:var(--muted);
    font-size:12px;
    padding:30px 20px 50px;
    line-height:1.6;
  }
  footer a{ color:var(--accent); text-decoration:none;}

  /* ---------- RESPONSIVE ---------- */

  /* Tablet — 900px and below */
  @media (max-width:900px){
    .layout{
      grid-template-columns:1fr;
      padding:14px;
      gap:14px;
    }
    aside{
      position:static;
      max-height:none;
      padding:10px;
    }
    .sidebar-title{ margin-bottom:8px;}
    .league-list{
      flex-direction:row;
      flex-wrap:nowrap;
      overflow-x:auto;
      scrollbar-width:none;
      gap:6px;
      padding-bottom:2px;
    }
    .league-list::-webkit-scrollbar{ display:none;}
    .league-btn{
      flex:0 0 auto;
      white-space:nowrap;
      padding:6px 12px;
      border-radius:16px;
      background:var(--panel-2);
    }
    .league-btn.active{ background:var(--accent); color:#1a1300;}
    .league-btn.active .country-flag{ color:#1a1300;}
  }

  /* Mobile — 600px and below */
  @media (max-width:600px){
    .header-inner{
      padding:10px 12px;
      gap:10px;
      flex-wrap:nowrap;
    }
    .logo{ font-size:16px;}
    .logo .dot{ width:8px; height:8px;}
    .last-updated{ display:none;}

    .nav{ gap:2px;}
    .nav-btn{
      padding:6px 10px;
      font-size:12px;
    }

    /* News ticker: thinner and more compact */
    .news-ticker{ height:30px;}
    .news-ticker-label{ font-size:10px; padding:0 9px;}
    .news-ticker-item{ font-size:12px;}
    .news-ticker-tag{ font-size:9px;}

    /* Date bar: smaller, no centering padding */
    .date-bar{ padding:6px 10px; gap:3px;}
    .date-btn{
      padding:5px 8px;
      font-size:12px;
      min-width:52px;
    }
    .date-btn .day{ font-size:9px;}
    .date-arrow{ width:28px;}

    /* Layout: tighter padding */
    .layout{ padding:10px; gap:10px;}

    /* Sidebar (leagues) becomes horizontal scroll */
    aside{ padding:8px 10px;}
    .sidebar-title{ font-size:10px; margin-bottom:6px;}
    .league-btn{
      font-size:12px;
      padding:5px 10px;
    }
    .league-btn .country-flag{ font-size:11px; margin-right:3px;}

    /* Main content */
    .section-head{ margin-bottom:10px;}
    .section-head h2{ font-size:14px;}
    .count-badge{ font-size:10px;}

    /* League groups & matches */
    .league-group{ margin-bottom:10px; border-radius:8px;}
    .league-header{ padding:8px 10px; font-size:10px;}
    .league-sport-tag{ font-size:9px;}
    .match-row{
      grid-template-columns:50px 1fr 28px;
      padding:9px 10px;
      gap:8px;
    }
    .status{ font-size:11px;}
    .status.live{ padding:3px 4px;}
    .team-name{ font-size:13px;}
    .score{ font-size:14px;}

    /* News grid: one column */
    .news-grid{
      grid-template-columns:1fr;
      gap:12px;
    }
    .news-image{ height:140px;}
    .news-title{ font-size:14px;}
    .news-body{ padding:12px;}
    .news-cat-tabs{ gap:4px;}
    .news-cat-tab{ padding:6px 11px; font-size:12px;}

    /* News modal: full screen on mobile */
    .news-modal{ padding:0;}
    .news-modal-content{
      border-radius:0;
      min-height:100vh;
      max-width:100%;
    }
    .news-modal-image{ height:200px;}
    .news-modal-body{ padding:18px 18px 24px;}
    .news-modal-title{ font-size:18px;}
    .news-modal-text{ font-size:14px;}
    .news-modal-close{
      top:10px; right:10px;
      width:34px; height:34px;
    }

    /* Dropdown menu: anchored to right edge on mobile */
    .dropdown-menu{
      right:8px !important;
      left:auto !important;
      min-width:180px;
    }

    /* Footer smaller */
    footer{ font-size:11px; padding:20px 14px 30px;}
  }

  /* Extra-small phones — 380px and below */
  @media (max-width:380px){
    .logo{ font-size:14px;}
    .nav-btn{ padding:5px 8px; font-size:11px;}

/* ---------- STATE ---------- */

let refreshTimer = null;

/* ---------- DATE HELPERS ---------- */
function dateForOffset(o){ const d=new Date(); d.setDate(d.getDate()+o); return d;}
function dateStr(d){ return d.toISOString().slice(0,10);}
function dayLabel(o){
  if(o===0) return t("today");
  if(o===-1) return t("yesterday");
  if(o===1) return t("tomorrow");
  const dayKeys=["sun","mon","tue","wed","thu","fri","sat"];
  return t(dayKeys[dateForOffset(o).getDay()]);
}
function dateMMDD(o){
  const d=dateForOffset(o);
  return (d.getDate()+"").padStart(2,"0")+"."+((d.getMonth()+1)+"").padStart(2,"0");
}

/* ---------- DATE BAR ---------- */
function renderDateBar(){
  const bar=document.getElementById("dateBar");
  if(currentView==="NEWS" || currentView==="LIVE"){
    bar.style.display = "none";
    return;
  }
  bar.style.display = "flex";
  let html=`<button class="date-arrow" id="datePrev">‹</button>`;
  for(let i=-3;i<=3;i++){
    const a = i===currentDateOffset?" active":"";
    html+=`<button class="date-btn${a}" data-offset="${i}">
      <span class="day">${dayLabel(i)}</span>${dateMMDD(i)}
    </button>`;
  }
  html+=`<button class="date-arrow" id="dateNext">›</button>`;
  bar.innerHTML=html;
  bar.querySelectorAll(".date-btn").forEach(b=>{
    b.addEventListener("click",()=>{
      currentDateOffset = parseInt(b.dataset.offset);
      renderDateBar(); loadAndRender();
    });
  });
  document.getElementById("datePrev").addEventListener("click",()=>{
    currentDateOffset--; renderDateBar(); loadAndRender();
  });
  document.getElementById("dateNext").addEventListener("click",()=>{
    currentDateOffset++; renderDateBar(); loadAndRender();
  });
}

/* ---------- SIDEBAR (LEAGUES) ---------- */
function renderSidebar(){
  const layout = document.getElementById("layout");
  const sidebar = document.getElementById("sidebar");
  const title = document.getElementById("sidebarTitle");
  const list = document.getElementById("leagueList");

  if(currentView === "NEWS"){
    layout.classList.add("no-sidebar");
    sidebar.style.display = "none";
    return;
  }
  layout.classList.remove("no-sidebar");
  sidebar.style.display = "block";

  if(currentView === "LIVE"){
    title.textContent = t("filter_by_sport");
    const sportsList = [
      {key:null, labelKey:"all_sports", icon:"🏆"},
      {key:"Soccer", labelKey:"football", icon:"⚽"},
      {key:"Basketball", labelKey:"basketball", icon:"🏀"},
      {key:"Tennis", labelKey:"tennis", icon:"🎾"}
    ];
    let liveHtml = "";
    sportsList.forEach(s=>{
      const active = currentLeague === s.key ? "active" : "";
      liveHtml += `<button class="league-btn ${active}" data-sport-filter="${s.key||""}">
        <span><span class="country-flag">${s.icon}</span>${t(s.labelKey)}</span>
      </button>`;
    });
    list.innerHTML = liveHtml;
    list.querySelectorAll(".league-btn").forEach(btn=>{
      btn.addEventListener("click",()=>{
        currentLeague = btn.dataset.sportFilter || null;
        renderSidebar();
        loadAndRender();
      });
    });
    return;
  }

  const leagues = LEAGUES_BY_SPORT[currentView] || [];
  const sportNameKey = currentView === "Soccer" ? "football" : currentView.toLowerCase();
  title.textContent = t(sportNameKey) + " " + t("leagues");

  let html = `<button class="league-btn ${currentLeague===null?"active":""}" data-league="">
    <span>${t("all_leagues")}</span>
  </button>`;
  leagues.forEach(l=>{
    const active = currentLeague===l.name ? "active" : "";
    html += `<button class="league-btn ${active}" data-league="${l.name}">
      <span><span class="country-flag">${l.country}</span>${l.name}</span>
    </button>`;
  });
  list.innerHTML = html;

  list.querySelectorAll(".league-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      currentLeague = btn.dataset.league || null;
      renderSidebar();
      loadAndRender();
    });
  });
}

/* ---------- STATUS ---------- */
function computeStatus(ev, dateOffset){
  const s = (ev.strStatus||"").toLowerCase().trim();
  if(["ft","aet","pen","fin"].includes(s) || s.includes("finished") || s.includes("ended")) return "finished";
  if(["ht","1h","2h","q1","q2","q3","q4","ot"].includes(s) || s.includes("live") || s.includes("inprogress") || s==="in progress") return "live";
  if(dateOffset < 0) return "finished";
  if(dateOffset > 0) return "scheduled";
  const hs=ev.intHomeScore, as=ev.intAwayScore;
  if(hs!=null && hs!=="" && as!=null && as!=="") return "live";
  return "scheduled";
}
function statusLabel(ev, cls){
  if(cls==="live") return ev.strProgress || (ev.strStatus && ev.strStatus.toUpperCase()) || "LIVE";
  if(cls==="finished") return "FT";
  return ev.strTime ? ev.strTime.slice(0,5) : "—";
}

/* ---------- FETCH ---------- */
async function fetchByDay(sport, date){
  const url=`https://www.thesportsdb.com/api/v1/json/${API_KEY}/eventsday.php?d=${date}&s=${encodeURIComponent(sport)}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error("API "+res.status);
  const data = await res.json();
  return data.events||[];
}
async function fetchLive(){
  try{
    const res = await fetch(`https://www.thesportsdb.com/api/v2/json/livescore/all`);
    if(!res.ok) throw new Error("Live "+res.status);
    const data = await res.json();
    return data.livescore || data.events || [];
  }catch(err){
    return [];
  }
}

/* ---------- RENDER MATCHES ---------- */

// Build a lookup: league name → flag emoji. Used so league headers show flags too.
const LEAGUE_FLAG_MAP = (function(){
  const m = {};
  Object.values(LEAGUES_BY_SPORT).forEach(list=>{
    list.forEach(l=>{ m[l.name.toLowerCase()] = l.country; });
  });
  return m;
})();

// Fallback detection by keyword if API returns a slightly different league name.
function detectFlag(leagueName){
  if(!leagueName) return "";
  const exact = LEAGUE_FLAG_MAP[leagueName.toLowerCase()];
  if(exact) return exact;
  const n = leagueName.toLowerCase();
  if(/cypr|κύπρ|κυπρ/.test(n)) return "🇨🇾";
  if(/greek|greece|ελλ/.test(n)) return "🇬🇷";
  if(/premier league|english|england|fa cup|efl/.test(n)) return "🏴󠁧󠁢󠁥󠁮󠁧󠁿";
  if(/la liga|spanish|spain|copa del rey/.test(n)) return "🇪🇸";
  if(/serie a|italian|italy|coppa italia/.test(n)) return "🇮🇹";
  if(/bundesliga|german|germany|dfb/.test(n)) return "🇩🇪";
  if(/ligue 1|french|france|coupe de france/.test(n)) return "🇫🇷";
  if(/eredivisie|dutch|netherlands/.test(n)) return "🇳🇱";
  if(/primeira|portuguese|portugal/.test(n)) return "🇵🇹";
  if(/super lig|turkish|turkey|türkiye/.test(n)) return "🇹🇷";
  if(/serbian|serbia|superliga/.test(n)) return "🇷🇸";
  if(/champions league|europa league|conference league|uefa|euro/.test(n)) return "🇪🇺";
  if(/nba|wnba|mls|us open|nfl|mlb|nhl/.test(n)) return "🇺🇸";
  if(/atp|wta|davis cup|grand slam/.test(n)) return "🌍";
  if(/formula|f1|grand prix/.test(n)) return "🏎️";
  return "🏆";
}

function groupByLeague(events){
  const g={};
  events.forEach(ev=>{
    const l=ev.strLeague||"Other";
    if(!g[l]) g[l]={sport:ev.strSport||"", items:[]};
    g[l].items.push(ev);
  });
  return g;
}
function renderEvents(events, dateOffset){
  const c=document.getElementById("results");
  const badge=document.getElementById("countBadge");
  badge.textContent = events.length ? (events.length + (events.length===1?" match":" matches")) : "0";
  if(!events.length){
    c.innerHTML=`<div class="empty">No matches for selected date or filter.</div>`;
    return;
  }
  const g=groupByLeague(events);
  let html="";
  Object.keys(g).forEach(league=>{
    const grp=g[league];
    const tag = grp.sport?`<span class="league-sport-tag">${SPORT_LABELS[grp.sport]||grp.sport}</span>`:"";
    const flag = detectFlag(league);
    html+=`<div class="league-group"><div class="league-header"><span class="league-flag">${flag}</span><span class="league-name">${league}</span>${tag}</div>`;
    grp.items.forEach(ev=>{
      const cls=computeStatus(ev,dateOffset);
      const home=ev.strHomeTeam||"?", away=ev.strAwayTeam||"?";
      const hs=(ev.intHomeScore!=null && ev.intHomeScore!=="") ? ev.intHomeScore : "-";
      const as=(ev.intAwayScore!=null && ev.intAwayScore!=="") ? ev.intAwayScore : "-";
      const hw=cls==="finished"&&hs!=="-"&&as!=="-"&&parseInt(hs)>parseInt(as);
      const aw=cls==="finished"&&hs!=="-"&&as!=="-"&&parseInt(as)>parseInt(hs);
      const sc=cls==="live"?"score live-score":"score";
      html+=`<div class="match-row">
        <div class="status ${cls}">${statusLabel(ev,cls)}</div>
        <div class="teams">
          <div class="team-line${hw?" winner":""}"><span class="team-name">${home}</span><span class="${sc}">${hs}</span></div>
          <div class="team-line${aw?" winner":""}"><span class="team-name">${away}</span><span class="${sc}">${as}</span></div>
        </div>
        <div></div>
      </div>`;
    });
    html+=`</div>`;
  });
  c.innerHTML=html;
}

function stripHtml(html){
  const tmp = document.createElement("div");
  tmp.innerHTML = html || "";
  return tmp.textContent || tmp.innerText || "";
}

function formatTime(dateStr){
  if(!dateStr) return "";
  const date = new Date(dateStr);
  const diff = (Date.now() - date.getTime()) / 1000;
  const lang = currentLang;
  if(lang === "gr"){
    if(diff < 60) return "τώρα";
    if(diff < 3600) return Math.floor(diff/60) + " λ.";
    if(diff < 86400) return Math.floor(diff/3600) + " ώ.";
    if(diff < 604800) return Math.floor(diff/86400) + " ημ.";
    return date.toLocaleDateString("el-GR");
  }
  if(diff < 60) return "just now";
  if(diff < 3600) return Math.floor(diff/60) + "m ago";
  if(diff < 86400) return Math.floor(diff/3600) + "h ago";
  if(diff < 604800) return Math.floor(diff/86400) + "d ago";
  return date.toLocaleDateString("en-GB");
}

function pickEmojiFromCategories(categories, title){
  const all = ((categories || []).join(" ") + " " + (title || "")).toLowerCase();
  if(/basket|μπασκ|μπάσκ/.test(all)) return "🏀";
  if(/tennis|τένις|τενις/.test(all)) return "🎾";
  return "⚽";
}

function categoryFromArticle(categories, title){
  const all = ((categories || []).join(" ") + " " + (title || "")).toLowerCase();
  if(/basket|μπασκ|μπάσκ/.test(all)) return "basketball";
  if(/tennis|τένις|τενις/.test(all)) return "tennis";
  return "football";
}

async function fetchAllNews(){
  // 10-minute cache for all news content
  if(cachedFeed && cachedFeed.lang === currentLang && (Date.now() - cachedFeed.time) < 10*60*1000){
    return cachedFeed.items;
  }
  // Curated Unsplash photo IDs per sport — real photographs, stable CDN URLs.
  // Each article gets a deterministic image based on its seed, so refresh keeps the same picture.
  const SPORT_PHOTOS = {
    football: [
      "1522778119026-d647f0596c20", "1629217855633-79a6925d6c47",
      "1489944440615-453fc2b6a9a9", "1706675780107-7c43cc487928",
      "1430232324554-8f4aebd06683", "1569531955323-33c6b2dca44b",
      "1599158150601-1417ebbaafdd", "1651421738652-12124d47c917",
      "1508100134119-f93388e60d95", "1540379708242-14a809bef941",
      "1559552673-350e98ba6a1f",  "1504016798967-59a258e9386d",
      "1507226353400-5ec8e43add88", "1556816214-6d16c62fbbf6",
      "1571754472834-677ab0a62ba7"
    ],
    basketball: [
      "1577416412292-747c6607f055", "1600534220378-df36338afc40",
      "1615174438196-b3538fe68737", "1602357280104-742c517a1d82",
      "1546519638-68e109498ffc",  "1572454181157-0b40dd7667fe",
      "1563302905-4830598613c0",  "1559692048-79a3f837883d",
      "1515326283062-ef852efa28a8", "1509027572446-af8401acfdc3",
      "1533923156502-be31530547c4", "1563506644863-444710df1e03",
      "1536089760511-ddfd66f75f96", "1536578524251-eff3c73e9207",
      "1496033604106-04799291ee86"
    ],
    tennis: [
      "1620742820748-87c09249a72a", "1547934045-2942d193cb49",
      "1448743133657-f67644da3008", "1578966663421-00f3bfebfa89",
      "1567220720374-a67f33b2a6b9", "1499510318569-1a3d67dc3976",
      "1541744573515-478c959628a0", "1465125672495-63cdc2fa22ed",
      "1551773188-0801da12ddae",   "1604967438356-597a56e99a05",
      "1545151414-8a948e1ea54f",   "1542144582-1ba00456b5e3",
      "1622669253059-e345500cf0e9", "1564769353575-73f33a36d84f"
    ]
  };
  // Return a deterministic Unsplash CDN URL per article. Different image per index.
  const sportImage = (category, seedStr) => {
    let h = 0;
    for(let i = 0; i < seedStr.length; i++) h = ((h<<5)-h) + seedStr.charCodeAt(i);
    const photos = SPORT_PHOTOS[category] || SPORT_PHOTOS.football;
    const id = photos[Math.abs(h) % photos.length];
    return `https://images.unsplash.com/photo-${id}?w=600&h=400&fit=crop&auto=format&q=75`;
  };
  // Start with our in-house articles for the current language; assign auto images.
  const customItems = (CUSTOM_ARTICLES[currentLang] || CUSTOM_ARTICLES.en).map((a, i) => ({
    ...a,
    image: a.image || sportImage(a.category, "custom-" + i)
  }));
  let feedItems = [];
  try{
    const rssUrl = encodeURIComponent("https://meridiansports.com.cy/feed/");
    const url = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}&count=30`;
    const res = await fetch(url);
    if(res.ok){
      const data = await res.json();
      if(data.status === "ok" && data.items){
        feedItems = data.items.map((item, i)=>{
          const cat = categoryFromArticle(item.categories, item.title);
          const tagFromCats = (item.categories && item.categories[0]) ? item.categories[0] : (cat === "basketball" ? "Μπάσκετ" : cat === "tennis" ? "Τένις" : "Ποδόσφαιρο");
          const thumb = item.thumbnail || (item.enclosure && item.enclosure.link) || null;
          return {
            tag: tagFromCats,
            category: cat,
            title: item.title,
            excerpt: stripHtml(item.description || item.content).slice(0, 200).trim(),
            fullText: stripHtml(item.content || item.description),
            time: formatTime(item.pubDate),
            emoji: pickEmojiFromCategories(item.categories, item.title),
            // Fall back to category-themed real photo if feed item has no thumbnail
            image: thumb || sportImage(cat, "feed-" + i)
          };
        });
      }
    }
  }catch(err){
    console.warn("Feed fetch failed:", err);
  }
  // Interleave: 2 custom at top, then alternate
  const merged = [];
  merged.push(...customItems.slice(0, 2));
  let cIdx = 2, fIdx = 0;
  while(fIdx < feedItems.length || cIdx < customItems.length){
    if(fIdx < feedItems.length){ merged.push(feedItems[fIdx++]); }
    if(fIdx % 3 === 0 && cIdx < customItems.length){ merged.push(customItems[cIdx++]); }
  }
  while(cIdx < customItems.length) merged.push(customItems[cIdx++]);
  cachedFeed = {time: Date.now(), lang: currentLang, items: merged};
  return merged;
}

async function fetchNews(categoryKey){
  const all = await fetchAllNews();
  if(categoryKey === "all" || !categoryKey) return all;
  return all.filter(a => a.category === categoryKey);
}



function buildCategoryTabsHtml(){
  let html = `<div class="news-cat-tabs">`;
  NEWS_CATEGORIES.forEach(cat=>{
    const active = cat.key === currentNewsCategory ? "active" : "";
    html += `<button class="news-cat-tab ${active}" data-cat="${cat.key}">${t(cat.labelKey)}</button>`;
  });
  html += `</div>`;
  return html;
}

function attachCategoryTabHandlers(){
  document.querySelectorAll(".news-cat-tab").forEach(b=>{
    b.addEventListener("click", ()=>{
      currentNewsCategory = b.dataset.cat;
      renderNews();
    });
  });
}

async function renderNews(){
  const c = document.getElementById("results");
  // Show tabs immediately, then load below them
  c.innerHTML = buildCategoryTabsHtml() + `<div class="loading">${t("loading_news")}</div>`;
  attachCategoryTabHandlers();

  const news = await fetchNews(currentNewsCategory);
  currentNewsList = news;
  document.getElementById("countBadge").textContent = news.length + " " + t("articles");

  if(!news.length){
    c.innerHTML = buildCategoryTabsHtml() + `<div class="empty">${t("no_matches")}</div>`;
    attachCategoryTabHandlers();
    return;
  }

  let cardsHtml = `<div class="news-grid">`;
  news.forEach((n, i)=>{
    const imgPart = n.image
      ? `<div class="news-image" style="background-image:url('${n.image}'); background-size:cover; background-position:center;"></div>`
      : `<div class="news-image">${n.emoji}</div>`;
    cardsHtml += `<div class="news-card" data-news-idx="${i}">
      ${imgPart}
      <div class="news-body">
        <div class="news-tag">${n.tag}</div>
        <h3 class="news-title">${n.title}</h3>
        <div class="news-meta">${n.time}</div>
        <p class="news-excerpt">${n.excerpt}</p>
      </div>
    </div>`;
  });
  cardsHtml += `</div>`;

  c.innerHTML = buildCategoryTabsHtml() + cardsHtml;
  attachCategoryTabHandlers();

  // Card click → open modal (no external redirect)
  c.querySelectorAll(".news-card").forEach(card=>{
    card.addEventListener("click", ()=>{
      const idx = parseInt(card.dataset.newsIdx);
      openNewsModal(currentNewsList[idx]);
    });
  });
}

/* ---------- NEWS MODAL ---------- */
function openNewsModal(item){
  if(!item) return;
  const modal = document.getElementById("newsModal");
  const img = document.getElementById("newsModalImage");
  if(item.image){
    img.style.backgroundImage = `url('${item.image}')`;
    img.textContent = "";
  }else{
    img.style.backgroundImage = "";
    img.textContent = item.emoji || "🏆";
  }
  document.getElementById("newsModalTag").textContent = item.tag || "Sport";
  document.getElementById("newsModalTitle").textContent = item.title || "";
  document.getElementById("newsModalMeta").textContent = item.time || "";
  // Split fullText into paragraphs for readability
  const paragraphs = (item.fullText || item.excerpt || "").split(/\n+/).filter(p=>p.trim());
  document.getElementById("newsModalText").innerHTML = paragraphs.map(p=>`<p>${p}</p>`).join("");
  // No external attribution shown
  document.getElementById("newsModalSource").innerHTML = "";
  modal.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeNewsModal(){
  document.getElementById("newsModal").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("newsModalClose").addEventListener("click", closeNewsModal);
document.getElementById("newsModalBackdrop").addEventListener("click", closeNewsModal);
document.addEventListener("keydown", (e)=>{
  if(e.key === "Escape") closeNewsModal();
});

/* ---------- UPDATE LABELS / LAYOUT ---------- */
function setLastUpdated(){
  const locale = currentLang === "gr" ? "el-GR" : "en-GB";
  document.getElementById("lastUpdated").textContent = t("updated") + ": " + new Date().toLocaleTimeString(locale);
}
function setSectionLabel(){
  const el=document.getElementById("sectionLabel");
  if(currentView==="NEWS"){ el.textContent=t("section_news"); return;}
  if(currentView==="LIVE"){ el.textContent=t("live_label"); return;}
  const sport = t(SPORT_LABELS[currentView] ? SPORT_LABELS[currentView].toLowerCase().replace(" ","_") : currentView.toLowerCase());
  const date = dayLabel(currentDateOffset) + " " + dateMMDD(currentDateOffset);
  el.textContent = (currentLeague || sport) + " · " + date;
}

/* ---------- MAIN LOAD ---------- */
async function loadAndRender(){
  setSectionLabel();
  if(currentView==="NEWS"){
    await renderNews();
    setLastUpdated();
    return;
  }
  const c=document.getElementById("results");
  c.innerHTML=`<div class="loading">${t("loading")}</div>`;
  try{
    let events, dateOffset;
    if(currentView==="LIVE"){
      events = await fetchLive();
      events = events.map(ev=>({...ev,strLeague:ev.strLeague||ev.strEvent||"Live",strStatus:ev.strStatus||"live"}))
        .filter(ev=>ev.strHomeTeam&&ev.strAwayTeam);
      dateOffset=0;
    }else{
      events = await fetchByDay(currentView, dateStr(dateForOffset(currentDateOffset)));
      dateOffset=currentDateOffset;
    }
    if(currentLeague){
      if(currentView === "LIVE"){
        // For LIVE view, currentLeague holds the sport name to filter by
        events = events.filter(ev=>ev.strSport === currentLeague);
      }else{
        events = events.filter(ev=>ev.strLeague===currentLeague);
      }
    }
    renderEvents(events,dateOffset);
    setLastUpdated();
  }catch(err){
    c.innerHTML=`<div class="error">Error: ${err.message}. Try again in a few seconds.</div>`;
  }
}

/* ---------- NAVIGATION ---------- */
function updateNavActive(){
  document.querySelectorAll(".nav-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.view === currentView);
  });
}

function switchView(view){
  currentView = view;
  currentLeague = null;
  updateNavActive();
  renderDateBar();
  renderSidebar();
  loadAndRender();
  // hide ticker on News page (redundant)
  document.getElementById("newsTicker").style.display = view === "NEWS" ? "none" : "flex";
  if(refreshTimer) clearInterval(refreshTimer);
  if(view !== "NEWS"){
    const interval = view === "LIVE" ? 30000 : 90000;
    refreshTimer = setInterval(loadAndRender, interval);
  }
}

document.querySelectorAll(".nav-btn[data-view]").forEach(btn=>{
  btn.addEventListener("click",()=>switchView(btn.dataset.view));
});

  }
};
let currentLang = (typeof localStorage !== "undefined" && localStorage.getItem("siLang")) || "en";

function t(key){
  return (TRANSLATIONS[currentLang] && TRANSLATIONS[currentLang][key]) || TRANSLATIONS.en[key] || key;
}

function applyLanguage(){
  // Update html lang attribute
  document.documentElement.lang = currentLang;
  // Update all elements with data-i18n
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.textContent = t(el.dataset.i18n);
  });
  // Update lang switch active state
  document.querySelectorAll(".lang-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.lang === currentLang);
  });
  // Re-render time-sensitive labels
  renderDateBar();
  renderSidebar();
  loadAndRender();
}

document.querySelectorAll(".lang-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    currentLang = btn.dataset.lang;
    if(typeof localStorage !== "undefined") localStorage.setItem("siLang", currentLang);
    applyLanguage();
  });
});

/* ---------- NEWS TICKER ---------- */
async function renderNewsTicker(){
  const content = document.getElementById("newsTickerContent");
  const news = await fetchNews("all");
  // build items list, then duplicate for seamless loop
  let items = "";
  // Use up to 10 items in ticker to keep it manageable
  news.slice(0, 10).forEach((n, i)=>{
    items += `<span class="news-ticker-item" data-news-idx="${i}">
      <span class="news-ticker-tag">${n.tag}</span>${n.title}
    </span><span class="news-ticker-sep">•</span>`;
  });
  // duplicate so the animation loops without a visible gap
  content.innerHTML = items + items;

  // click any ticker headline → switch to News view and open that article
  content.querySelectorAll(".news-ticker-item").forEach(el=>{
    el.addEventListener("click", ()=>{
      const idx = parseInt(el.dataset.newsIdx);
      switchView("NEWS");
      // small delay so News view renders before modal opens
      setTimeout(()=>{
        // currentNewsList is populated by renderNews()
        if(currentNewsList && currentNewsList[idx]) openNewsModal(currentNewsList[idx]);
      }, 300);
    });
  });
}
document.getElementById("newsTickerLabel").addEventListener("click", ()=>switchView("NEWS"));

/* ---------- INIT ---------- */
applyLanguage();  // sets HTML lang, translates nav buttons, then triggers re-render
renderNewsTicker();
refreshTimer = setInterval(loadAndRender, 90000);
